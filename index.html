<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #333;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: white;
            margin: 0;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .nav-links a:hover {
            color: #ffc107;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h2 {
            font-size: 50px;
        }

        .hero p {
            font-size: 20px;
        }

        .btn {
            padding: 10px 20px;
            background: #ffc107;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Section */
        .section {
            padding: 50px;
            text-align: center;
        }

        /* Footer */
        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>MyWebsite</h1>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <div>
            <h2>Welcome to My Website</h2>
            <p>Your journey starts here</p>
            <button class="btn">Get Started</button>
        </div>
    </div>

    <!-- About Section -->
    <div class="section">
        <h2>About Us</h2>
        <p>This is a simple homepage design using HTML and CSS.</p>
    </div>

    <!-- Services Section -->
    <div class="section">
        <h2>Our Services</h2>
        <p>We provide web development, design, and more.</p>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2026 MyWebsite | All Rights Reserved</p>
    </div>

</body>
</html>
